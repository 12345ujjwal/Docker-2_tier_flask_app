<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask App new🚀</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #050816;
            position: relative;
            padding: 20px;
        }

        /* ===== Animated Background ===== */

        .bg-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .bg-animation span {
            position: absolute;
            display: block;
            border-radius: 50%;
            animation: animate 25s linear infinite;
            bottom: -150px;
        }

        .bg-animation span:nth-child(1) {
            left: 10%;
            width: 80px;
            height: 80px;
            background: rgba(255, 0, 128, 0.2);
            animation-duration: 18s;
        }

        .bg-animation span:nth-child(2) {
            left: 25%;
            width: 25px;
            height: 25px;
            background: rgba(0, 255, 255, 0.3);
            animation-duration: 12s;
        }

        .bg-animation span:nth-child(3) {
            left: 40%;
            width: 120px;
            height: 120px;
            background: rgba(255, 165, 0, 0.15);
            animation-duration: 25s;
        }

        .bg-animation span:nth-child(4) {
            left: 60%;
            width: 50px;
            height: 50px;
            background: rgba(0, 255, 150, 0.2);
            animation-duration: 15s;
        }

        .bg-animation span:nth-child(5) {
            left: 75%;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.08);
            animation-duration: 20s;
        }

        .bg-animation span:nth-child(6) {
            left: 90%;
            width: 40px;
            height: 40px;
            background: rgba(0, 140, 255, 0.2);
            animation-duration: 10s;
        }

        @keyframes animate {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            100% {
                transform: translateY(-1200px) rotate(720deg);
                opacity: 0;
            }
        }

        /* ===== Glowing Grid ===== */

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);

            background-size: 40px 40px;
            z-index: 0;
        }

        /* ===== Main Container ===== */

        /* ===== PREMIUM CONTAINER ===== */

.container {
    position: relative;
    z-index: 5;

    width: 100%;
    max-width: 720px;

    padding: 40px;

    border-radius: 30px;

    background: rgba(10, 10, 25, 0.75);

    border: 1px solid rgba(255,255,255,0.08);

    backdrop-filter: blur(25px);

    box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 20px 60px rgba(0,0,0,0.7),
        0 0 120px rgba(0,255,255,0.08);

    overflow: hidden;
}

/* glowing border effect */

.container::before {
    content: '';

    position: absolute;
    inset: 0;

    padding: 1px;

    border-radius: 30px;

    background: linear-gradient(
        135deg,
        rgba(0,255,255,0.5),
        rgba(255,0,255,0.3),
        rgba(255,140,0,0.3)
    );

    -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);

    -webkit-mask-composite: xor;

    mask-composite: exclude;

    pointer-events: none;
}

/* ===== TITLE ===== */

h2 {
    font-size: 2.4rem;
    font-weight: 700;

    line-height: 1.3;

    margin-bottom: 30px;

    text-align: center;

    color: white;

    letter-spacing: 1px;
}

h2 span {
    background: linear-gradient(
        90deg,
        #00f7ff,
        #8a5cff,
        #ff00aa
    );

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* ===== MESSAGE AREA ===== */

.messages {
    max-height: 320px;

    overflow-y: auto;

    padding-right: 10px;

    margin-bottom: 25px;
}

.messages::-webkit-scrollbar {
    width: 5px;
}

.messages::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
}

.messages p {
    position: relative;

    padding: 18px 20px;

    margin-bottom: 16px;

    border-radius: 18px;

    background: linear-gradient(
        135deg,
        rgba(255,255,255,0.06),
        rgba(255,255,255,0.02)
    );

    border: 1px solid rgba(255,255,255,0.08);

    color: #fff;

    font-size: 15px;

    line-height: 1.5;

    transition: all 0.3s ease;
}

.messages p:hover {
    transform: translateY(-3px);

    background: linear-gradient(
        135deg,
        rgba(0,255,255,0.08),
        rgba(255,0,255,0.05)
    );

    box-shadow:
        0 10px 25px rgba(0,0,0,0.35),
        0 0 25px rgba(0,255,255,0.08);
}

/* ===== FORM ===== */

#messageForm {
    display: flex;
    gap: 15px;
    align-items: center;
}

/* ===== INPUT ===== */

input[type="text"] {
    flex: 1;

    height: 60px;

    border-radius: 18px;

    padding: 0 22px;

    font-size: 16px;

    color: white;

    background: rgba(255,255,255,0.05);

    border: 1px solid rgba(255,255,255,0.08);

    outline: none;

    transition: 0.3s ease;
}

input[type="text"]:focus {
    border-color: rgba(0,255,255,0.7);

    background: rgba(255,255,255,0.07);

    box-shadow:
        0 0 0 4px rgba(0,255,255,0.08),
        0 0 25px rgba(0,255,255,0.15);
}

input[type="text"]::placeholder {
    color: rgba(255,255,255,0.45);
}

/* ===== BUTTON ===== */

input[type="submit"] {
    height: 60px;

    padding: 0 30px;

    border: none;

    border-radius: 18px;

    cursor: pointer;

    font-size: 15px;
    font-weight: 600;

    color: white;

    background: linear-gradient(
        135deg,
        #00d9ff,
        #7a5cff,
        #ff00aa
    );

    background-size: 300% 300%;

    transition: all 0.35s ease;

    animation: gradientShift 5s ease infinite;
}

input[type="submit"]:hover {
    transform: translateY(-3px) scale(1.03);

    box-shadow:
        0 12px 30px rgba(0,255,255,0.2),
        0 0 30px rgba(255,0,170,0.18);
}

@keyframes gradientShift {

    0% {
        background-position: 0% 50%;
    }

    50% {
        background-position: 100% 50%;
    }

    100% {
        background-position: 0% 50%;
    }
}

/* ===== MOBILE ===== */

@media(max-width: 700px) {

    .container {
        padding: 25px;
    }

    h2 {
        font-size: 1.7rem;
    }

    #messageForm {
        flex-direction: column;
    }

    input[type="submit"] {
        width: 100%;
    }
}

        @keyframes floatCard {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        
/* ===== FORM ===== */

#messageForm {
    display: flex;
    gap: 15px;
    align-items: center;
}
    
    </style>
</head>

<body>

    <!-- Animated Background -->
    <div class="bg-animation">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    </div>

    <!-- Main UI -->
    <div class="container">

        <h2>      
    Flask + MySQL (2 Tier) <br>
    <span>Skill Nebula Pvt Ltd</span> 🚀
        </h2>

        <div class="messages">
            {% for message in messages %}
                <p>{{ message[0] }}</p>
            {% endfor %}
        </div>

        <form id="messageForm">
            <input type="text"
                   name="new_message"
                   placeholder="Type your message..."
                   required>

            <input type="submit" value="Send">
        </form>

    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        $(document).ready(function () {

            $("#messageForm").on("submit", function (event) {

                event.preventDefault();

                let messageInput = $("input[name='new_message']");
                let message = messageInput.val().trim();

                if (message === "") {
                    alert("Message cannot be empty!");
                    return;
                }

                $.ajax({
                    url: "/submit",
                    type: "POST",
                    data: { new_message: message },

                    success: function (response) {

                        if (response && response.message) {

                            $(".messages").append(
                                "<p>" + response.message + "</p>"
                            );

                            messageInput.val("");

                        } else {

                            console.error(
                                "Unexpected response format:",
                                response
                            );
                        }
                    },

                    error: function (xhr, status, error) {
                        console.error("AJAX Error:", status, error);
                    }
                });
            });
        });
    </script>

</body>
</html>
